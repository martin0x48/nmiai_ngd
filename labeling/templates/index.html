<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meny Labeler</title>
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --sidebar-bg: #1c1c2e;
  --sidebar-text: #b8b8cc;
  --sidebar-active: #6366f1;
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --success: #22c55e;
  --warning: #f59e0b;
  --error: #ef4444;
  --text: #1a1a2e;
  --text2: #64748b;
  --border: #e2e8f0;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}
#app {
  display: grid;
  grid-template-columns: 220px 1fr 380px;
  grid-template-rows: 52px 1fr;
  height: 100vh;
}

header {
  grid-column: 1/-1;
  background: var(--sidebar-bg);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 10;
}
header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
header select, header button {
  background: rgba(255,255,255,.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,.15);
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
}
header select:focus, header button:hover { background: rgba(255,255,255,.2); }
header .spacer { flex:1; }
header .progress { font-size: 12px; color: var(--sidebar-text); }
.btn-export { background: var(--primary) !important; border-color: var(--primary) !important; font-weight: 600; }
.btn-shelf { background: rgba(34,197,94,.25) !important; border-color: rgba(34,197,94,.4) !important; font-weight: 600; }

aside {
  background: var(--sidebar-bg);
  overflow-y: auto;
  padding: 8px 0;
  border-right: 1px solid rgba(255,255,255,.05);
}
aside::-webkit-scrollbar { width: 4px; }
aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }
.img-item {
  padding: 6px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--sidebar-text);
  transition: background .12s;
}
.img-item:hover { background: rgba(255,255,255,.05); }
.img-item.active { background: var(--sidebar-active); color: #fff; }
aside.shelf-pick .img-item { cursor:copy; }
aside.shelf-pick .img-item:hover { background: rgba(34,197,94,.3); }
aside.shelf-pick .img-item.active { background: var(--sidebar-active); cursor:default; }
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot.done { background: var(--success); }
.dot.partial { background: var(--warning); }
.dot.none { background: var(--error); opacity:.6; }
.img-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.img-item .cnt { font-size:10px; opacity:.65; }
.folder-hdr {
  padding: 10px 14px 4px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: rgba(255,255,255,.3);
  font-weight: 700;
}

.center { display: flex; flex-direction: column; overflow: hidden; }
.viewport {
  flex:1; overflow: auto;
  display: flex; align-items: center; justify-content: center;
  padding: 10px; background: #e5e5ea;
}
.img-wrap { position: relative; display: inline-block; line-height: 0; }
.img-wrap img { display: block; max-width: 100%; max-height: calc(100vh - 52px - 100px); }
.img-wrap.rot90 { transform: rotate(90deg); }
.img-wrap.rot180 { transform: rotate(180deg); }
.img-wrap.rot270 { transform: rotate(270deg); }
.bbox {
  position: absolute;
  border: 2px solid rgba(99,102,241,.65);
  cursor: pointer;
  transition: border-color .12s, box-shadow .12s;
}
.bbox:hover { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99,102,241,.25); }
.bbox.sel { border-color: #fbbf24; border-width: 3px; box-shadow: 0 0 0 3px rgba(251,191,36,.3); }
.bbox.lbl { border-color: var(--success); }
.bbox.lbl.sel { border-color: #fbbf24; }
.bbox.warn { border-color: #f97316; border-width: 3px; box-shadow: 0 0 0 3px rgba(249,115,22,.3); }
.bbox.warn.sel { border-color: #fbbf24; }
.bbox.fp { border-color: var(--error); opacity:.35; }
.bbox-n {
  position: absolute; top:-1px; left:-1px;
  background: rgba(99,102,241,.82); color:#fff;
  font-size:9px; font-weight:700; padding:1px 4px;
  border-radius:0 0 4px 0; line-height:1.3;
}
.bbox.lbl .bbox-n { background: rgba(34,197,94,.82); }
.bbox.warn .bbox-n { background: rgba(249,115,22,.9); }
.bbox.sel .bbox-n { background: rgba(251,191,36,.9); color: #1a1a2e; }

.strip {
  height: 94px; background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
  padding: 6px 10px; overflow-x: auto;
}
.strip::-webkit-scrollbar { height: 4px; }
.strip::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
.cthumb {
  width: 66px; height: 78px; flex-shrink: 0;
  border-radius: 5px; overflow: hidden; cursor: pointer;
  border: 2px solid var(--border); position: relative;
  transition: border-color .12s, transform .12s;
}
.cthumb:hover { border-color: var(--primary); transform: scale(1.06); }
.cthumb.sel { border-color: #fbbf24; border-width: 3px; }
.cthumb.lbl { border-color: var(--success); }
.cthumb.fp { border-color: var(--error); opacity:.45; }
.cthumb.warn { border-color: #f97316; border-width: 3px; }
.cthumb img { width:100%; height:100%; object-fit:cover; }
.cthumb .tn { position:absolute; top:2px; left:2px; background:rgba(0,0,0,.55); color:#fff; font-size:9px; padding:0 3px; border-radius:3px; }
.cthumb .tc { position:absolute; bottom:2px; right:2px; background:var(--success); color:#fff; width:14px; height:14px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; }
.cthumb .conf-bar {
  position:absolute; bottom:0; left:0; right:0; height:3px;
  background: rgba(0,0,0,.15);
}
.cthumb .conf-fill { height:100%; border-radius:0 0 3px 3px; }

.rpanel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto; padding: 14px; gap: 14px;
}
.rpanel::-webkit-scrollbar { width: 4px; }
.rpanel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
.crop-preview { background: #f8f8fa; border-radius: var(--radius); padding: 8px; text-align: center; }
.crop-preview img { max-width:100%; max-height:200px; border-radius:4px; }
.crop-preview .info { font-size:11px; color:var(--text2); margin-top:4px; }

.sug-box { background: #eef2ff; border: 1px solid #c7d2fe; border-radius: var(--radius); padding: 12px; }
.sug-box .lbl { font-size:11px; font-weight:700; color:var(--primary); margin-bottom:3px; }
.sug-box .pname { font-size:14px; font-weight:600; margin-bottom:3px; word-break:break-word; }
.sug-box .conf { font-size:12px; color:var(--text2); margin-bottom:8px; }
.sug-box .acts { display:flex; gap:6px; flex-wrap:wrap; }

.cur-label { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: var(--radius); padding: 12px; }
.cur-label .lbl { font-size:11px; font-weight:700; color:var(--success); margin-bottom:3px; }
.cur-label .pname { font-size:14px; font-weight:600; word-break:break-word; }
.cur-label .acts { display:flex; gap:6px; margin-top:8px; }

.fp-label { background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius); padding: 12px; }
.fp-label .lbl { font-size:11px; font-weight:700; color:var(--error); }

.btn { padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:none; transition:background .12s; white-space:nowrap; }
.btn-g { background:var(--success); color:#fff; }
.btn-g:hover { background:#16a34a; }
.btn-w { background:var(--warning); color:#fff; }
.btn-w:hover { background:#d97706; }
.btn-r { background:var(--error); color:#fff; }
.btn-r:hover { background:#dc2626; }
.btn-s { padding:4px 10px; border-radius:4px; font-size:11px; cursor:pointer; border:1px solid var(--border); background:#fff; }
.btn-s:hover { background:#f5f5f5; }

.search-wrap { position:relative; }
.search-input {
  width:100%; padding:9px 11px;
  border:2px solid var(--border); border-radius:var(--radius);
  font-size:13px; outline:none; transition:border-color .12s;
}
.search-input:focus { border-color:var(--primary); }
.sresults {
  position:absolute; top:100%; left:0; right:0;
  background:var(--surface); border:1px solid var(--border);
  border-radius:0 0 var(--radius) var(--radius);
  box-shadow:0 4px 12px rgba(0,0,0,.1);
  max-height:280px; overflow-y:auto; z-index:100; display:none;
}
.sresults.vis { display:block; }
.sresult {
  padding:7px 11px; cursor:pointer; font-size:12px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:6px;
}
.sresult:last-child { border-bottom:none; }
.sresult:hover, .sresult.hl { background:#eef2ff; }
.sresult .cname { flex:1; word-break:break-word; }
.sresult .cid { font-size:10px; color:var(--text2); flex-shrink:0; }

.ref-imgs { display:flex; gap:5px; flex-wrap:wrap; }
.ref-imgs img {
  width:56px; height:56px; object-fit:cover; border-radius:4px;
  border:1px solid var(--border); cursor:pointer; transition:transform .15s;
}
.ref-imgs img:hover { transform:scale(2.2); z-index:10; position:relative; }
.ref-lbl { font-size:11px; font-weight:700; color:var(--text2); margin-bottom:3px; }

.nav-row { display:flex; gap:6px; margin-top:auto; padding-top:8px; }
.nav-row button { flex:1; }

.shortcuts { font-size:10px; color:var(--text2); line-height:1.7; }
.shortcuts kbd {
  background:#f1f5f9; border:1px solid var(--border);
  padding:0 4px; border-radius:3px; font-family:monospace; font-size:10px;
}

.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text2); gap:6px; text-align:center; font-size:13px; }
.empty .ic { font-size:40px; }

.done-banner { text-align:center; padding:24px 16px; }
.done-banner .ic { font-size:48px; margin-bottom:8px; }
.done-banner .msg { font-size:16px; font-weight:600; margin-bottom:12px; }

/* modal overlay */
.modal-bg {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.45);
  display:flex; align-items:center; justify-content:center;
  z-index:1000;
}
.modal-card {
  background:var(--surface); border-radius:12px;
  padding:20px; max-width:520px; width:90%;
  max-height:90vh; overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
}
.modal-card h3 { font-size:16px; margin-bottom:4px; }
.modal-card .sub { font-size:12px; color:var(--text2); margin-bottom:14px; }
.modal-item {
  display:flex; align-items:center; gap:10px;
  padding:8px; cursor:pointer; border-radius:6px;
  transition:background .1s;
}
.modal-item:hover { background:#eef2ff; }
.modal-item img { width:80px; height:56px; object-fit:cover; border-radius:4px; border:1px solid var(--border); }
.modal-item .mi-name { font-size:12px; font-weight:600; word-break:break-word; }
.modal-item .mi-stats { font-size:11px; color:var(--text2); }
.modal-cancel { margin-top:12px; width:100%; padding:8px; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:13px; }
.modal-cancel:hover { background:#f5f5f5; }

.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:#1e293b; color:#fff; padding:12px 24px; border-radius:10px;
  font-size:13px; font-weight:500; z-index:2000;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  animation: toastIn .3s ease, toastOut .3s ease 3s forwards;
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes toastOut { to { opacity:0; transform:translateX(-50%) translateY(20px); } }

.review-cmp { display:flex; gap:10px; align-items:flex-start; }
.review-col { flex:1; min-width:0; }
.review-col .lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px; }
.review-box {
  border-radius: var(--radius); padding: 10px;
}
.review-box.cur { background:#f0fdf4; border:1px solid #bbf7d0; }
.review-box.pred { background:#eef2ff; border:1px solid #c7d2fe; }
.review-box .pname { font-size:13px; font-weight:600; word-break:break-word; }
.review-match { background:#f0fdf4; border:2px solid var(--success); border-radius:var(--radius); padding:8px; text-align:center; font-size:13px; font-weight:600; color:var(--success); }
.review-mismatch { background:#fff7ed; border:2px solid var(--warning); border-radius:var(--radius); padding:8px; text-align:center; font-size:13px; font-weight:600; color:#ea580c; }
.btn-review { background: rgba(168,85,247,.25) !important; border-color: rgba(168,85,247,.4) !important; font-weight: 600; }
.btn-review.active { background: rgba(168,85,247,.6) !important; }
.btn-errors { background: rgba(249,115,22,.25) !important; border-color: rgba(249,115,22,.4) !important; font-weight: 600; }
.btn-errors.active { background: rgba(249,115,22,.6) !important; }

.pending-box {
  background: #fff7ed; border: 2px solid #fdba74;
  border-radius: var(--radius); padding: 12px;
}
.pending-box .lbl { font-size:11px; font-weight:700; color:#ea580c; margin-bottom:3px; }
.pending-box .pname { font-size:16px; font-weight:700; word-break:break-word; }
.ref-imgs-lg { display:flex; gap:8px; flex-wrap:wrap; }
.ref-imgs-lg img {
  width:110px; height:110px; object-fit:cover;
  border-radius:6px; border:2px solid var(--border);
  transition: transform .15s;
}
.ref-imgs-lg img:hover { transform:scale(1.8); z-index:10; position:relative; }
</style>
</head>
<body>
<div id="app">

<header>
  <h1>Meny Labeler</h1>
  <select id="folder-sel"></select>
  <button onclick="prevImage()">&#9664;</button>
  <span id="img-counter" style="font-size:13px">-</span>
  <button onclick="nextImage()">&#9654;</button>
  <button onclick="rotateImage()" title="Rotate 90° (R)">&#8635; Rotate</button>
  <button onclick="redetect()" title="Re-run YOLO detector on this image">&#128472; Re-detect</button>
  <button class="btn-shelf" onclick="openShelfModal()">&#128203; Same shelf...</button>
  <button class="btn-review" id="review-btn" onclick="toggleReview()">&#128270; Review</button>
  <button class="btn-errors" id="errors-btn" onclick="toggleErrors()">&#9888; Find errors</button>
  <button style="background:rgba(239,68,68,.25)!important;border-color:rgba(239,68,68,.4)!important;font-weight:600" onclick="clearAllLabels()">&#128465; Clear labels</button>
  <span class="spacer"></span>
  <span class="progress" id="glob-prog">-</span>
  <button class="btn-export" onclick="exportCoco()">Export COCO</button>
</header>

<aside id="sidebar"></aside>

<div class="center">
  <div class="viewport" id="viewport">
    <div class="empty" id="empty-state">
      <div class="ic">&#127991;&#65039;</div>
      <div>Select an image from the sidebar</div>
    </div>
    <div class="img-wrap" id="img-wrap" style="display:none">
      <img id="main-img" />
      <div id="bbox-layer"></div>
    </div>
  </div>
  <div class="strip" id="strip"></div>
</div>

<div class="rpanel" id="rpanel">
  <div class="empty">Select a detection to start labeling</div>
</div>

</div>

<script>
let categories=[], catById={};
let folders={}, curFolder=null, curImgIdx=-1, curImgPath=null;
let imgData=null, detections=[];
let selIdx=-1, hlIdx=0, filtered=[];
let pendingLabel=null;
let rotation=0;
let imageRotations={};
let reviewMode=false;
let shelfPickMode=false;
let showErrors=false;

async function init(){
  const [cats,imgs] = await Promise.all([
    fetch('/api/categories').then(r=>r.json()),
    fetch('/api/images').then(r=>r.json()),
  ]);
  categories=cats;
  catById={};
  cats.forEach(c=>catById[c.id]=c);

  // Merge all folders into a single flat list
  const allImages=[];
  for(const fname of Object.keys(imgs).sort())
    for(const im of imgs[fname]) allImages.push(im);
  folders={"All":allImages};

  const sel=document.getElementById('folder-sel');
  sel.style.display='none';
  curFolder="All";
  renderSidebar();
  updGlobalProg();
}

function updGlobalProg(){
  let td=0,tl=0;
  for(const imgs of Object.values(folders))
    for(const im of imgs){ td+=im.detections; tl+=im.labeled; }
  document.getElementById('glob-prog').textContent=
    tl+'/'+td+' labeled ('+(td?Math.round(tl/td*100):0)+'%)';
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML='';
  sb.className=shelfPickMode?'shelf-pick':'';
  if(!curFolder||!folders[curFolder]) return;
  const imgs=folders[curFolder];
  const hdr=document.createElement('div');
  hdr.className='folder-hdr';
  hdr.textContent=shelfPickMode?'Click an image to copy labels from':'All';
  sb.appendChild(hdr);
  for(let i=0;i<imgs.length;i++){
    const im=imgs[i];
    const d=document.createElement('div');
    d.className='img-item'+(i===curImgIdx?' active':'');
    let st='none';
    if(im.labeled>=im.detections&&im.detections>0) st='done';
    else if(im.labeled>0) st='partial';
    const short=im.name.length>24 ? im.name.slice(0,10)+'...'+im.name.slice(-12) : im.name;
    d.innerHTML=`<div class="dot ${st}"></div><div class="name" title="${esc(im.name)}">${esc(short)}</div><div class="cnt">${im.labeled}/${im.detections}</div>`;
    if(shelfPickMode&&i!==curImgIdx){
      d.onclick=()=>{ shelfPickMode=false; applyShelf(im.path); };
    } else {
      d.onclick=()=>loadImage(i);
    }
    sb.appendChild(d);
  }
}

async function loadImage(idx){
  const imgs=folders[curFolder];
  if(idx<0||idx>=imgs.length) return;
  curImgIdx=idx;
  curImgPath=imgs[idx].path;
  renderSidebar();
  document.getElementById('img-counter').textContent=(idx+1)+'/'+imgs.length;
  const wrap=document.getElementById('img-wrap');
  const empty=document.getElementById('empty-state');
  const img=document.getElementById('main-img');
  rotation=imageRotations[curImgPath]||0;
  empty.style.display='none';
  wrap.style.display='inline-block';
  wrap.className='img-wrap'+(rotation?(' rot'+rotation):'');
  img.src='/api/image/'+curImgPath+'?w=1400&t='+Date.now();

  const resp=await fetch('/api/detections/'+curImgPath);
  imgData=await resp.json();
  detections=imgData.detections;

  if(reviewMode){
    detections=detections.filter(d=>d.label&&d.label.category_id!=null&&d.label.category_id!==-1);
    detections.sort((a,b)=>(a.suggestion_conf||0)-(b.suggestion_conf||0));
  } else {
    detections.sort((a,b)=>(b.suggestion_conf||0)-(a.suggestion_conf||0));
  }

  img.onload=()=>{
    renderBboxes();
    renderStrip();
    if(reviewMode){
      selectDet(detections.length?0:-1);
    } else {
      const first=detections.findIndex(d=>!d.label);
      selectDet(first>=0?first:(detections.length?0:-1));
    }
  };
}

/* ── bounding boxes (use sorted array index for display, det.idx for API) ── */
function isLikelyError(det){
  if(!showErrors) return false;
  if(!det.label||det.label.category_id==null||det.label.category_id===-1) return false;
  if(det.suggested_category_id==null) return false;
  return det.label.category_id!==det.suggested_category_id&&(det.suggestion_conf||0)>=0.5;
}

function renderBboxes(){
  const layer=document.getElementById('bbox-layer');
  layer.innerHTML='';
  const W=imgData.width, H=imgData.height;
  if(!W||!H) return;
  for(let i=0;i<detections.length;i++){
    const det=detections[i];
    const [x1,y1,x2,y2]=det.bbox_xyxy;
    const l=x1/W*100, t=y1/H*100, w=(x2-x1)/W*100, h=(y2-y1)/H*100;
    const d=document.createElement('div');
    let cls='bbox';
    if(isLikelyError(det)) cls+=' warn';
    else if(det.label) cls+=det.label.category_id===-1?' fp':' lbl';
    if(i===selIdx) cls+=' sel';
    d.className=cls;
    d.style.cssText=`left:${l}%;top:${t}%;width:${w}%;height:${h}%`;
    d.innerHTML=`<span class="bbox-n">${i+1}</span>`;
    const si=i; d.onclick=()=>selectDet(si);
    layer.appendChild(d);
  }
}

function renderStrip(){
  const s=document.getElementById('strip');
  s.innerHTML='';
  for(let i=0;i<detections.length;i++){
    const det=detections[i];
    const t=document.createElement('div');
    let cls='cthumb';
    if(isLikelyError(det)) cls+=' warn';
    else if(det.label) cls+=det.label.category_id===-1?' fp':' lbl';
    if(i===selIdx) cls+=' sel';
    t.className=cls;
    const cp=((det.suggestion_conf||0)*100).toFixed(0);
    const barColor=cp>=80?'var(--success)':cp>=50?'var(--warning)':'var(--error)';
    t.innerHTML=`<img src="/api/crop/${curImgPath}/${det.idx}?size=140" loading="lazy"/><span class="tn">${i+1}</span>${det.label&&det.label.category_id!==-1?'<span class="tc">&#10003;</span>':''}<div class="conf-bar"><div class="conf-fill" style="width:${cp}%;background:${barColor}"></div></div>`;
    const si=i; t.onclick=()=>selectDet(si);
    s.appendChild(t);
  }
}

function selectDet(idx){
  pendingLabel=null;
  if(idx<0||idx>=detections.length){ selIdx=-1; renderBboxes(); renderStrip(); renderPanel(); return; }
  selIdx=idx;
  renderBboxes(); renderStrip(); renderPanel();
  const strip=document.getElementById('strip');
  if(strip.children[idx]) strip.children[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function renderPanel(){
  const p=document.getElementById('rpanel');
  if(selIdx<0||!detections[selIdx]){
    p.innerHTML='<div class="empty">Select a detection to start labeling</div>';
    return;
  }
  const det=detections[selIdx];
  const hasLbl=det.label&&det.label.category_id!==null&&det.label.category_id!==-1;
  const isFP=det.label&&det.label.category_id===-1;
  let h='';

  h+=`<div class="crop-preview"><img src="/api/crop/${curImgPath}/${det.idx}?size=400&t=${Date.now()}"/><div class="info">Detection ${selIdx+1}/${detections.length} &middot; conf ${((det.det_conf||0)*100).toFixed(0)}% &middot; cls ${((det.suggestion_conf||0)*100).toFixed(0)}%</div></div>`;

  if(reviewMode&&hasLbl){
    const match=det.label.category_id===det.suggested_category_id;
    const cp=((det.suggestion_conf||0)*100).toFixed(0);
    h+=match
      ?`<div class="review-match">&#10003; Label matches prediction (${cp}%)</div>`
      :`<div class="review-mismatch">&#9888; Label differs from prediction (${cp}%)</div>`;

    const lblCat=catById[det.label.category_id];
    const sugCat=catById[det.suggested_category_id];

    h+=`<div class="review-cmp">`;
    h+=`<div class="review-col"><div class="review-box cur"><div class="lbl" style="color:var(--success)">Your label</div><div class="pname">${esc(det.label.category_name)}</div></div>`;
    if(lblCat) h+=refImgsHtml(lblCat);
    h+=`</div>`;
    h+=`<div class="review-col"><div class="review-box pred"><div class="lbl" style="color:var(--primary)">Prediction</div><div class="pname">${esc(det.suggested_category_name||'?')}</div></div>`;
    if(sugCat) h+=refImgsHtml(sugCat);
    h+=`</div>`;
    h+=`</div>`;

    h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;">`;
    h+=`<button class="btn btn-g" onclick="advNextReview()" style="flex:2">&#10003; Keep label <kbd>Enter</kbd></button>`;
    if(!match) h+=`<button class="btn btn-w" onclick="usePrediction()" style="flex:2">Use prediction <kbd>P</kbd></button>`;
    h+=`</div>`;
    h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;">`;
    h+=`<button class="btn-s" onclick="clearLbl(${selIdx})" style="flex:1">Search new</button>`;
    h+=`<button class="btn btn-r" onclick="markFP(${selIdx})" style="flex:1">False positive</button>`;
    h+=`</div>`;

    h+=`<div class="nav-row"><button class="btn-s" onclick="selectDet(${selIdx-1})" ${selIdx===0?'disabled':''}>&#8592; Prev</button><button class="btn-s" onclick="selectDet(${selIdx+1})" ${selIdx>=detections.length-1?'disabled':''}  style="flex:2">Next &#8594;</button></div>`;
    h+=`<div class="shortcuts"><kbd>Enter</kbd> keep &nbsp; <kbd>P</kbd> use prediction &nbsp; <kbd>D</kbd> false positive<br><kbd>&#8592;</kbd><kbd>&#8594;</kbd> prev/next &nbsp; <kbd>PgUp</kbd><kbd>PgDn</kbd> prev/next image</div>`;
  } else if(hasLbl){
    h+=`<div class="cur-label"><div class="lbl">&#10003; Labeled</div><div class="pname">${esc(det.label.category_name)}</div><div class="acts"><button class="btn-s" onclick="clearLbl(${selIdx})">Change</button><button class="btn-s" onclick="markFP(${selIdx})">False positive</button></div></div>`;
    const cat=catById[det.label.category_id];
    if(cat) h+=refImgsHtml(cat);
  } else if(isFP){
    h+=`<div class="fp-label"><div class="lbl">&#10007; False positive</div><button class="btn-s" onclick="clearLbl(${selIdx})" style="margin-top:6px">Undo</button></div>`;
  } else if(pendingLabel){
    const pc=catById[pendingLabel.category_id];
    h+=`<div class="pending-box"><div class="lbl">&#9203; Confirm this label?</div><div class="pname">${esc(pendingLabel.category_name)}</div></div>`;
    if(pc&&pc.product_code&&pc.image_types&&pc.image_types.length){
      h+=`<div style="margin-top:2px"><div class="ref-lbl">Reference images &mdash; compare with crop above</div><div class="ref-imgs-lg">`;
      for(const t of pc.image_types) h+=`<img src="/api/product-image/${pc.product_code}/${t}" title="${t}" loading="lazy"/>`;
      h+=`</div></div>`;
    } else {
      h+=`<div style="font-size:12px;color:var(--text2);margin-top:4px;">No reference images available for this product.</div>`;
    }
    h+=`<div style="display:flex;gap:8px;"><button class="btn btn-g" onclick="confirmLabel()" style="flex:1">&#10003; Confirm <kbd>Enter</kbd></button><button class="btn-s" onclick="cancelPending()" style="flex:1">&#10007; Back <kbd>Esc</kbd></button></div>`;
  } else {
    if(det.suggested_category_id!==undefined){
      const sc=catById[det.suggested_category_id];
      const cp=((det.suggestion_conf||0)*100).toFixed(0);
      h+=`<div class="sug-box"><div class="lbl">&#129302; Classifier suggests</div><div class="pname">${esc(det.suggested_category_name||'Unknown')}</div><div class="conf">Confidence: ${cp}%</div><div class="acts"><button class="btn btn-g" onclick="acceptSug()">&#10003; Accept <kbd>Enter</kbd></button><button class="btn btn-w" onclick="markUnknown()">? Unknown <kbd>U</kbd></button></div></div>`;
      if(sc) h+=refImgsHtml(sc);
    }
    h+=`<div class="search-wrap"><input class="search-input" id="sinput" placeholder="Search product name..." oninput="onSInput(this.value)" onkeydown="onSKey(event)" autocomplete="off"/><div class="sresults" id="sresults"></div></div>`;
    h+=`<div><button class="btn btn-r" onclick="markFP(${selIdx})">&#10007; False positive <kbd>D</kbd></button></div>`;
  }

  if(!(reviewMode&&hasLbl)){
    h+=`<div class="nav-row"><button class="btn-s" onclick="selectDet(${selIdx-1})" ${selIdx===0?'disabled':''}>&#8592; Prev</button><button class="btn-s" onclick="advNext()" style="flex:2">Next unlabeled &#8594;</button><button class="btn-s" onclick="selectDet(${selIdx+1})" ${selIdx>=detections.length-1?'disabled':''}>Next &#8594;</button></div>`;
    h+=`<div class="shortcuts"><kbd>Enter</kbd> accept → confirm &nbsp; <kbd>Esc</kbd> cancel &nbsp; <kbd>U</kbd> unknown &nbsp; <kbd>D</kbd> false positive<br><kbd>&#8592;</kbd><kbd>&#8594;</kbd> prev/next det &nbsp; <kbd>PgUp</kbd><kbd>PgDn</kbd> prev/next image<br><kbd>/</kbd> focus search &nbsp; <kbd>S</kbd> same shelf</div>`;
  }

  p.innerHTML=h;
  if(!reviewMode&&!hasLbl&&!isFP) setTimeout(()=>{const i=document.getElementById('sinput');if(i)i.focus();},60);
}

function refImgsHtml(cat){
  if(!cat.product_code||!cat.image_types||!cat.image_types.length) return '';
  let h='<div style="margin-top:6px"><div class="ref-lbl">Reference images</div><div class="ref-imgs">';
  for(const t of cat.image_types) h+=`<img src="/api/product-image/${cat.product_code}/${t}" title="${t}" loading="lazy"/>`;
  return h+'</div></div>';
}

/* ── search ── */
function onSInput(q){
  const box=document.getElementById('sresults');
  if(!q||!q.trim()){ box.classList.remove('vis'); filtered=[]; return; }
  const tokens=q.toLowerCase().split(/\s+/).filter(Boolean);
  let res=[];
  for(const cat of categories){
    const nm=cat.name.toLowerCase();
    if(!tokens.every(t=>nm.includes(t))) continue;
    let score=0;
    if(nm===q.toLowerCase()) score=1000;
    else if(nm.startsWith(tokens[0])) score=100;
    else score=10;
    score-=nm.length*0.01;
    res.push({...cat,score});
  }
  res.sort((a,b)=>b.score-a.score);
  filtered=res.slice(0,15);
  hlIdx=0;
  renderSResults();
  box.classList.add('vis');
}

function onSKey(e){
  if(e.key==='ArrowDown'){ e.preventDefault(); if(hlIdx<filtered.length-1){hlIdx++;renderSResults();} }
  else if(e.key==='ArrowUp'){ e.preventDefault(); if(hlIdx>0){hlIdx--;renderSResults();} }
  else if(e.key==='Enter'){
    e.preventDefault();
    const inp=document.getElementById('sinput');
    if(inp&&inp.value.trim()&&filtered.length) pickCat(filtered[hlIdx]);
    else acceptSug();
  }
  else if(e.key==='Escape'){ document.getElementById('sresults').classList.remove('vis'); }
}

function renderSResults(){
  const box=document.getElementById('sresults');
  if(!box) return;
  box.innerHTML='';
  for(let i=0;i<filtered.length;i++){
    const r=filtered[i];
    const d=document.createElement('div');
    d.className='sresult'+(i===hlIdx?' hl':'');
    d.innerHTML=`<span class="cname">${esc(r.name)}</span><span class="cid">#${r.id}</span>`;
    d.onclick=()=>pickCat(r);
    d.onmouseenter=()=>{hlIdx=i;renderSResults();};
    box.appendChild(d);
  }
  if(box.children[hlIdx]) box.children[hlIdx].scrollIntoView({block:'nearest'});
}

/* ── actions (arrayIdx = index in sorted detections array, det.idx = API index) ── */
function pickCat(cat){ pendingLabel={category_id:cat.id,category_name:cat.name}; renderPanel(); }

async function acceptSug(){
  const det=detections[selIdx];
  if(!det||det.suggested_category_id===undefined) return;
  await saveLbl(selIdx,det.suggested_category_id,det.suggested_category_name);
  advNext();
}

async function confirmLabel(){
  if(!pendingLabel) return;
  await saveLbl(selIdx,pendingLabel.category_id,pendingLabel.category_name);
  pendingLabel=null;
  advNext();
}

function cancelPending(){ pendingLabel=null; renderPanel(); }

async function markUnknown(){
  const unk=categories.find(c=>c.name==='unknown_product');
  await saveLbl(selIdx, unk?unk.id:355, 'unknown_product');
  advNext();
}

async function markFP(arrayIdx){
  const det=detections[arrayIdx];
  await fetch('/api/delete-detection',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_path:curImgPath,idx:det.idx})});
  det.label={category_id:-1,category_name:'__false_positive__'};
  updImgProg(); advNext();
}

async function clearLbl(arrayIdx){
  const det=detections[arrayIdx];
  await fetch('/api/clear-label',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_path:curImgPath,idx:det.idx})});
  delete det.label;
  updImgProg(); selectDet(arrayIdx);
}

async function saveLbl(arrayIdx,catId,catName){
  const det=detections[arrayIdx];
  await fetch('/api/label',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_path:curImgPath,idx:det.idx,category_id:catId,category_name:catName})});
  det.label={category_id:catId,category_name:catName};
  updImgProg();
}

function updImgProg(){
  if(!curFolder||curImgIdx<0) return;
  const im=folders[curFolder][curImgIdx];
  im.labeled=detections.filter(d=>d.label&&d.label.category_id!==null).length;
  renderSidebar(); updGlobalProg();
}

function advNextReview(){
  if(selIdx<detections.length-1) selectDet(selIdx+1);
  else{
    renderBboxes(); renderStrip();
    const p=document.getElementById('rpanel');
    p.innerHTML=`<div class="done-banner"><div class="ic">&#9989;</div><div class="msg">All labels reviewed!</div><button class="btn btn-g" onclick="nextImage()">Next image &#8594;</button></div>`;
  }
}

async function usePrediction(){
  const det=detections[selIdx];
  if(!det||det.suggested_category_id===undefined) return;
  await saveLbl(selIdx,det.suggested_category_id,det.suggested_category_name);
  renderBboxes(); renderStrip();
  advNextReview();
}

function advNext(){
  let next=detections.findIndex((d,i)=>i>selIdx&&!d.label);
  if(next<0) next=detections.findIndex(d=>!d.label);
  if(next>=0){ selectDet(next); return; }
  renderBboxes(); renderStrip();
  const p=document.getElementById('rpanel');
  p.innerHTML=`<div class="done-banner"><div class="ic">&#9989;</div><div class="msg">All detections labeled!</div><button class="btn btn-g" onclick="nextImage()">Next image &#8594;</button></div>`;
}

async function redetect(){
  if(!curImgPath){ showToast('Load an image first'); return; }
  const rot=imageRotations[curImgPath]||0;
  showToast('Re-detecting'+(rot?' (with '+rot+'° rotation)':'')+' ... this may take a moment');
  try{
    const resp=await fetch('/api/redetect/'+curImgPath,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({rotation:rot}),
    });
    const data=await resp.json();
    if(!resp.ok){ showToast('Error: '+(data.error||'unknown')); return; }
    if(rot){ imageRotations[curImgPath]=0; rotation=0; }
    showToast('Re-detected: '+data.detections+' bounding boxes');
    await loadImage(curImgIdx);
  }catch(e){ showToast('Error: '+e.message); }
}

async function clearAllLabels(){
  if(!curImgPath){ showToast('Load an image first'); return; }
  if(!confirm('Clear ALL labels on this image?')) return;
  await fetch('/api/clear-all-labels',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_path:curImgPath})});
  showToast('All labels cleared');
  await loadImage(curImgIdx);
}

function toggleErrors(){
  showErrors=!showErrors;
  document.getElementById('errors-btn').classList.toggle('active',showErrors);
  if(imgData){
    renderBboxes();
    renderStrip();
    if(showErrors){
      const errCount=detections.filter(d=>isLikelyError(d)).length;
      showToast(errCount?errCount+' potential error'+(errCount>1?'s':'')+' found':'No errors found on this image');
    }
  }
}

function toggleReview(){
  reviewMode=!reviewMode;
  document.getElementById('review-btn').classList.toggle('active',reviewMode);
  if(curImgPath) loadImage(curImgIdx);
  else showToast(reviewMode?'Review mode ON':'Review mode OFF');
}

function rotateImage(){
  rotation=(rotation+90)%360;
  if(curImgPath) imageRotations[curImgPath]=rotation;
  const wrap=document.getElementById('img-wrap');
  wrap.className='img-wrap'+(rotation?(' rot'+rotation):'');
}

function prevImage(){ if(curImgIdx>0) loadImage(curImgIdx-1); }
function nextImage(){
  const imgs=folders[curFolder];
  if(curImgIdx<imgs.length-1) loadImage(curImgIdx+1);
}

async function exportCoco(){
  const r=await fetch('/api/export',{method:'POST'});
  const d=await r.json();
  showToast('Exported '+d.annotations+' annotations across '+d.images+' images');
}

/* ── same shelf modal ── */
function openShelfModal(){
  if(!curFolder||curImgIdx<0){ showToast('Load an image first'); return; }
  shelfPickMode=!shelfPickMode;
  renderSidebar();
  const btn=document.querySelector('.btn-shelf');
  if(shelfPickMode){
    btn.textContent='Cancel shelf pick';
    showToast('Click an image in the sidebar to copy labels from');
    return;
  }
  btn.innerHTML='&#128203; Same shelf...';
  const imgs=folders[curFolder].filter((im,i)=>im.labeled>0&&i!==curImgIdx).reverse();
  if(!imgs.length){ showToast('No labeled images in this folder to copy from'); return; }

  let html='<div class="modal-bg" onclick="closeShelfModal()">';
  html+='<div class="modal-card" onclick="event.stopPropagation()">';
  html+='<h3>Copy labels from shelf image</h3>';
  html+='<div class="sub">Select a reference image. Labels will be matched by product type and position, then copied to the current image. Existing labels won\'t be overwritten.</div>';
  for(const im of imgs){
    html+=`<div class="modal-item" onclick="applyShelf('${im.path}')">`;
    html+=`<img src="/api/image/${im.path}?w=160" loading="lazy"/>`;
    html+=`<div><div class="mi-name">${esc(im.name)}</div><div class="mi-stats">${im.labeled}/${im.detections} labeled</div></div>`;
    html+=`</div>`;
  }
  html+='<button class="modal-cancel" onclick="closeShelfModal()">Cancel</button>';
  html+='</div></div>';

  const div=document.createElement('div');
  div.id='shelf-modal'; div.innerHTML=html;
  document.body.appendChild(div);
}

function closeShelfModal(){
  const m=document.getElementById('shelf-modal');
  if(m) m.remove();
}

async function applyShelf(refPath){
  closeShelfModal();
  shelfPickMode=false;
  document.querySelector('.btn-shelf').innerHTML='&#128203; Same shelf...';
  renderSidebar();
  showToast('Matching detections...');

  const resp=await fetch('/api/match-shelf',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({current:curImgPath,reference:refPath}),
  });
  const data=await resp.json();

  const resp2=await fetch('/api/detections/'+curImgPath);
  imgData=await resp2.json();
  detections=imgData.detections;
  detections.sort((a,b)=>(b.suggestion_conf||0)-(a.suggestion_conf||0));

  updImgProg();
  renderBboxes();
  renderStrip();

  const unlabeled=detections.filter(d=>!d.label).length;
  showToast(`Copied ${data.applied} labels. ${unlabeled} still unlabeled.`);

  const first=detections.findIndex(d=>!d.label);
  selectDet(first>=0?first:0);
}

/* ── toast notifications ── */
function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

/* ── keyboard ── */
document.addEventListener('keydown',e=>{
  const act=document.activeElement;
  if(act&&act.tagName==='INPUT') return;
  if(e.key==='ArrowLeft'){ e.preventDefault(); if(selIdx>0) selectDet(selIdx-1); }
  else if(e.key==='ArrowRight'){ e.preventDefault(); if(selIdx<detections.length-1) selectDet(selIdx+1); }
  else if(e.key==='Enter'){ e.preventDefault(); if(reviewMode) advNextReview(); else if(pendingLabel) confirmLabel(); else acceptSug(); }
  else if(e.key==='p'||e.key==='P'){ if(reviewMode){ e.preventDefault(); usePrediction(); } }
  else if(e.key==='Backspace'){ if(pendingLabel){ e.preventDefault(); cancelPending(); } }
  else if(e.key==='Escape'){ e.preventDefault(); if(shelfPickMode){ shelfPickMode=false; document.querySelector('.btn-shelf').innerHTML='&#128203; Same shelf...'; renderSidebar(); } else if(pendingLabel) cancelPending(); }
  else if(e.key==='u'||e.key==='U'){ e.preventDefault(); markUnknown(); }
  else if(e.key==='d'||e.key==='D'){ e.preventDefault(); if(selIdx>=0) markFP(selIdx); }
  else if(e.key==='PageUp'){ e.preventDefault(); prevImage(); }
  else if(e.key==='PageDown'){ e.preventDefault(); nextImage(); }
  else if(e.key==='/'){
    e.preventDefault();
    const inp=document.getElementById('sinput');
    if(inp) inp.focus();
  }
  else if(e.key==='r'||e.key==='R'){ e.preventDefault(); rotateImage(); }
  else if(e.key==='s'||e.key==='S'){ e.preventDefault(); openShelfModal(); }
});

function esc(s){ return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }

init();
</script>
